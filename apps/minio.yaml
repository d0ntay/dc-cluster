apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.min.io
    chart: minio
    targetRevision: "5.4.0"
    helm:
      values: |
        mode: standalone
        existingSecret: minio-credentials
        persistence:
          size: 10Gi
          storageClass: longhorn
        ingress:
          enabled: true
          ingressClassName: traefik
          hosts:
            - minio.dc.internal
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
        consoleIngress:
          enabled: true
          ingressClassName: traefik
          hosts:
            - minio-api.dc.internal
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
