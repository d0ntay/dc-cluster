---
# PLACEHOLDER — seal this with kubeseal before committing:
#
#   kubectl create secret generic api-credentials \
#     --namespace network-automation \
#     --from-literal=NAUTOBOT_TOKEN=<your-nautobot-api-token> \
#     --from-literal=JWT_SECRET=<your-jwt-secret> \
#     --from-literal=CORS_ORIGINS=http://netauto.dc.internal \
#     --from-literal=NETCONF_USERNAME=<your-netconf-user> \
#     --from-literal=NETCONF_PASSWORD=<your-netconf-pass> \
#     --from-literal=NETCONF_PORT=830 \
#     --from-literal=NETCONF_TIMEOUT=30 \
#     --from-literal=AWX_URL=<your-awx-url> \
#     --from-literal=AWX_TOKEN=<your-awx-token> \
#     --from-literal=SERVICENOW_URL=<your-snow-url> \
#     --from-literal=SERVICENOW_USERNAME=<your-snow-user> \
#     --from-literal=SERVICENOW_PASSWORD=<your-snow-pass> \
#     --dry-run=client -o yaml \
#     | kubeseal --controller-name=sealed-secrets-controller \
#               --controller-namespace=kube-system \
#               --format yaml \
#     > secrets/network-automation-api.yaml
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-credentials
  namespace: network-automation
spec:
  encryptedData:
    NAUTOBOT_TOKEN: REPLACE_WITH_SEALED_VALUE
    JWT_SECRET: REPLACE_WITH_SEALED_VALUE
    CORS_ORIGINS: REPLACE_WITH_SEALED_VALUE
    NETCONF_USERNAME: REPLACE_WITH_SEALED_VALUE
    NETCONF_PASSWORD: REPLACE_WITH_SEALED_VALUE
    NETCONF_PORT: REPLACE_WITH_SEALED_VALUE
    NETCONF_TIMEOUT: REPLACE_WITH_SEALED_VALUE
    AWX_URL: REPLACE_WITH_SEALED_VALUE
    AWX_TOKEN: REPLACE_WITH_SEALED_VALUE
    SERVICENOW_URL: REPLACE_WITH_SEALED_VALUE
    SERVICENOW_USERNAME: REPLACE_WITH_SEALED_VALUE
    SERVICENOW_PASSWORD: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: api-credentials
      namespace: network-automation
