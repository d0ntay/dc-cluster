apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-dashboard
  labels:
    {{- include "financial-dashboard.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "financial-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "financial-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: financial-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-port"
            - "8080"
            - "-static"
            - "/static"
            - "-shutdown-timeout"
            - {{ .Values.shutdownTimeout | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: financial-dashboard-secret
          env:
            - name: APP_URL
              value: "http://{{ .Values.host }}"
            - name: ENV
              value: "production"
            - name: TZ
              value: "America/New_York"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
