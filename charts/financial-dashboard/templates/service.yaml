apiVersion: v1
kind: Service
metadata:
  name: financial-dashboard
  labels:
    {{- include "financial-dashboard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "financial-dashboard.selectorLabels" . | nindent 4 }}
