apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: financial-dashboard
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: financial-dashboard
                port:
                  number: 8080
