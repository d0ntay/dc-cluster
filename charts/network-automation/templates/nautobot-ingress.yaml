apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nautobot
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: nautobot.dc.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nautobot
                port:
                  number: 8080
