apiVersion: apps/v1
kind: Deployment
metadata:
  name: nautobot-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: nautobot-redis
    {{- include "network-automation.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nautobot-redis
  template:
    metadata:
      labels:
        app: nautobot-redis
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
