apiVersion: v1
kind: Service
metadata:
  name: nautobot
  namespace: {{ .Release.Namespace }}
  labels:
    app: nautobot
    {{- include "network-automation.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: nautobot
    component: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
