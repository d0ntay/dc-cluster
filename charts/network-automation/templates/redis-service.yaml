apiVersion: v1
kind: Service
metadata:
  name: nautobot-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: nautobot-redis
    {{- include "network-automation.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: nautobot-redis
  ports:
    - port: 6379
      targetPort: 6379
