apiVersion: apps/v1
kind: Deployment
metadata:
  name: nautobot-db
  namespace: {{ .Release.Namespace }}
  labels:
    app: nautobot-db
    {{- include "network-automation.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nautobot-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nautobot-db
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: nautobot-credentials
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nautobot"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nautobot"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nautobot-db-data
