apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels:
    app: api
    {{- include "network-automation.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: api
          image: "{{ .Values.registry }}/{{ .Values.api.image }}:{{ .Values.api.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: NAUTOBOT_URL
              value: "http://nautobot:8080"
            - name: REDIS_URL
              value: "redis://nautobot-redis:6379/3"
            - name: NAUTOBOT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nautobot-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://nautobot:$(NAUTOBOT_DB_PASSWORD)@nautobot-db:5432/netauto_auth"
            - name: DATABASE_URL_SYNC
              value: "postgresql+psycopg2://nautobot:$(NAUTOBOT_DB_PASSWORD)@nautobot-db:5432/netauto_auth"
          envFrom:
            - secretRef:
                name: api-credentials
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
