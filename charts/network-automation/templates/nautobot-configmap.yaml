apiVersion: v1
kind: ConfigMap
metadata:
  name: nautobot-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: nautobot
    {{- include "network-automation.labels" . | nindent 4 }}
data:
  nautobot_config.py: |
    """Nautobot configuration for NOC platform (headless mode)."""
    import os

    from nautobot.core.settings import *  # noqa: F401,F403
    from nautobot.core.settings_funcs import parse_redis_connection

    ALLOWED_HOSTS = os.getenv("NAUTOBOT_ALLOWED_HOSTS", "nautobot,localhost").split(",")
    SECRET_KEY = os.getenv("NAUTOBOT_SECRET_KEY", "change-me")

    DATABASES = {
        "default": {
            "NAME": os.getenv("NAUTOBOT_DB_NAME", "nautobot"),
            "USER": os.getenv("NAUTOBOT_DB_USER", "nautobot"),
            "PASSWORD": os.getenv("NAUTOBOT_DB_PASSWORD", "nautobot123"),
            "HOST": os.getenv("NAUTOBOT_DB_HOST", "nautobot-db"),
            "PORT": os.getenv("NAUTOBOT_DB_PORT", "5432"),
            "ENGINE": "django.db.backends.postgresql",
            "CONN_MAX_AGE": 300,
        }
    }

    CACHES = {
        "default": {
            "BACKEND": "django_redis.cache.RedisCache",
            "LOCATION": f"redis://{os.getenv('NAUTOBOT_REDIS_HOST', 'nautobot-redis')}:{os.getenv('NAUTOBOT_REDIS_PORT', '6379')}/0",
            "TIMEOUT": 300,
            "OPTIONS": {
                "CLIENT_CLASS": "django_redis.client.DefaultClient",
            },
        }
    }

    CELERY_BROKER_URL = f"redis://{os.getenv('NAUTOBOT_REDIS_HOST', 'nautobot-redis')}:{os.getenv('NAUTOBOT_REDIS_PORT', '6379')}/1"
    CELERY_RESULT_BACKEND = f"redis://{os.getenv('NAUTOBOT_REDIS_HOST', 'nautobot-redis')}:{os.getenv('NAUTOBOT_REDIS_PORT', '6379')}/2"

    CORS_ALLOW_ALL_ORIGINS = False
    CORS_ALLOWED_ORIGINS = os.getenv(
        "NAUTOBOT_CORS_ORIGINS", "http://api:8000"
    ).split(",")
    GRAPHQL_ENABLED = True
