openclaw:
  app-template:
    openclawVersion: "2026.2.23"

    controllers:
      main:
        containers:
          main:
            envFrom:
              - secretRef:
                  name: openclaw-env-secret

    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "controlUi": {
                  "dangerouslyAllowHostHeaderOriginFallback": true
                }
              },
              "agents": {
                "defaults": {
                  "model": {
                    "primary": "anthropic/claude-opus-4-6"
                  }
                }
              },
              "channels": {
                "telegram": {
                  "enabled": true,
                  "botToken": "${TELEGRAM_BOT_TOKEN}"
                }
              }
            }
